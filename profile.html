<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Профиль</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <header>
        <h1>AvDrom</h1>
        <nav id="main-nav">
            <a href="/">Главная</a>
            <a href="about.html">О нас</a>
            <a href="/profile">Профиль</a>
        </nav>
    </header>

    <section class="hero profile-hero">
        <h2>Личный кабинет пользователя</h2>
        <p id="profile-status">Загрузка данных...</p>
    </section>

    <main class="profile-layout">
        <section class="profile-panel">
            <h3>Данные аккаунта</h3>
            <div id="profile-data" class="profile-data"></div>
        </section>

        <section class="profile-panel">
            <h3>Новое объявление</h3>
            <form id="item-form" class="profile-form">
                <input type="text" id="item-title" placeholder="Название объявления" required>
                <div class="profile-form-grid">
                    <input type="text" id="item-brand" placeholder="Марка" required>
                    <input type="text" id="item-model" placeholder="Модель" required>
                </div>
                <div class="profile-form-grid">
                    <input type="number" id="item-price" placeholder="Стоимость" required>
                    <input type="number" id="item-year" placeholder="Год выпуска">
                </div>
                <textarea id="item-description" placeholder="Описание автомобиля"></textarea>
                <label class="upload-field">
                    <span>Фотография с компьютера</span>
                    <input type="file" id="item-image" accept="image/*">
                </label>
                <div id="image-preview" class="image-preview hidden"></div>
                <button type="submit" class="primary-button">Опубликовать объявление</button>
            </form>
        </section>

        <section class="profile-panel profile-panel-wide admin-panel hidden" id="admin-panel">
            <div class="panel-header">
                <div>
                    <h3>Панель администратора</h3>
                    <p class="panel-subtitle">Изменяй роли пользователей и удаляй аккаунты.</p>
                </div>
            </div>
            <div id="users-list" class="admin-users-list"></div>
        </section>

        <section class="profile-panel profile-panel-wide">
            <div class="panel-header">
                <div>
                    <h3>Объявления</h3>
                    <p class="panel-subtitle">Фильтруй список, добавляй в избранное и удаляй объявления.</p>
                </div>
                <form action="/api/auth/logout" method="POST">
                    <button type="submit" class="secondary-button">Выйти</button>
                </form>
            </div>

            <div class="tabs-row">
                <button class="tab-button active" data-tab="all" type="button">Все объявления</button>
                <button class="tab-button" data-tab="favorites" type="button">Избранное</button>
            </div>

            <form id="filters-form" class="filters-grid">
                <input type="text" id="filter-brand" placeholder="Марка">
                <input type="text" id="filter-model" placeholder="Модель">
                <input type="number" id="filter-min-price" placeholder="Цена от">
                <input type="number" id="filter-max-price" placeholder="Цена до">
                <input type="number" id="filter-year" placeholder="Год">
                <button type="submit" class="primary-button compact-button">Применить фильтры</button>
            </form>

            <div id="items-list" class="cars-container"></div>
        </section>
    </main>

    <footer>
        <p>© 2026 AvDrom. Все права защищены.</p>
    </footer>

    <script>
        let selectedImageData = '';
        let activeTab = 'all';
        let currentUser = null;

        async function loadProfile() {
            const response = await fetch('/api/auth/me');
            if (!response.ok) {
                window.location.href = '/auth/login';
                return;
            }

            const user = await response.json();
            currentUser = user;
            const roleLabel = user.role === 'admin' ? 'Администратор' : 'Пользователь';
            document.getElementById('profile-status').textContent = `Вы вошли как: ${roleLabel}.`;
            document.getElementById('profile-data').innerHTML = `
                <div class="info-row"><span>Имя</span><strong>${user.name}</strong></div>
                <div class="info-row"><span>Email</span><strong>${user.email}</strong></div>
                <div class="info-row"><span>Роль</span><strong>${roleLabel}</strong></div>
                <div class="info-row"><span>Дата регистрации</span><strong>${new Date(user.createdAt).toLocaleString()}</strong></div>
            `;

            if (user.role === 'admin') {
                document.getElementById('admin-panel').classList.remove('hidden');
                loadUsers();
            }
        }

        async function loadUsers() {
            const response = await fetch('/api/users');
            if (!response.ok) {
                return;
            }

            const users = await response.json();
            const usersList = document.getElementById('users-list');

            usersList.innerHTML = users.map((user) => `
                <article class="admin-user-card">
                    <div>
                        <h4>${user.name}</h4>
                        <p>${user.email}</p>
                        <span class="card-badge">${user.role}</span>
                    </div>
                    <div class="admin-user-actions">
                        <select data-role-select="${user.id}" ${user.id === currentUser.id ? 'disabled' : ''}>
                            <option value="user" ${user.role === 'user' ? 'selected' : ''}>user</option>
                            <option value="admin" ${user.role === 'admin' ? 'selected' : ''}>admin</option>
                        </select>
                        <button type="button" class="primary-button compact-button" data-role-save="${user.id}" ${user.id === currentUser.id ? 'disabled' : ''}>Сменить роль</button>
                        <button type="button" class="danger-button" data-user-delete="${user.id}" ${user.id === currentUser.id ? 'disabled' : ''}>Удалить аккаунт</button>
                    </div>
                </article>
            `).join('');
        }

        function getFilterParams() {
            const params = new URLSearchParams();
            const brand = document.getElementById('filter-brand').value.trim();
            const model = document.getElementById('filter-model').value.trim();
            const minPrice = document.getElementById('filter-min-price').value.trim();
            const maxPrice = document.getElementById('filter-max-price').value.trim();
            const year = document.getElementById('filter-year').value.trim();

            if (brand) params.set('brand', brand);
            if (model) params.set('model', model);
            if (minPrice) params.set('minPrice', minPrice);
            if (maxPrice) params.set('maxPrice', maxPrice);
            if (year) params.set('year', year);
            if (activeTab === 'favorites') params.set('favoritesOnly', 'true');

            return params.toString();
        }

        function renderItems(items) {
            const itemsList = document.getElementById('items-list');

            if (!Array.isArray(items) || items.length === 0) {
                itemsList.innerHTML = '<p class="empty-state">Объявления пока не найдены. Попробуй изменить фильтры.</p>';
                return;
            }

            itemsList.innerHTML = items.map((item) => `
                <article class="car-card listing-card">
                    ${item.imageData ? `<img src="${item.imageData}" alt="${item.title}">` : '<div class="image-placeholder">Фото не загружено</div>'}
                    <div class="card-badge">${item.brand}</div>
                    <h3>${item.title}</h3>
                    <p class="price-line">${Number(item.price).toLocaleString()} ₽</p>
                    <p>${item.model}${item.year ? `, ${item.year} г.` : ''}</p>
                    <p>${item.description || 'Описание пока не добавлено.'}</p>
                    <div class="card-meta">Автор: ${item.ownerName}</div>
                    <div class="card-actions">
                        <button type="button" class="${item.isFavorite ? 'favorite-button active' : 'favorite-button'}" data-favorite-id="${item.id}">
                            ${item.isFavorite ? 'Убрать из избранного' : 'В избранное'}
                        </button>
                        ${item.isOwner || currentUser?.role === 'admin' ? `<button type="button" class="danger-button" data-delete-id="${item.id}">Удалить</button>` : ''}
                    </div>
                </article>
            `).join('');
        }

        async function loadItems() {
            const query = getFilterParams();
            const response = await fetch(`/api/items${query ? `?${query}` : ''}`);
            const items = await response.json();
            renderItems(items);
        }

        async function toggleFavorite(itemId, isActive) {
            const response = await fetch(`/api/favorites/${itemId}`, {
                method: isActive ? 'DELETE' : 'POST'
            });

            if (!response.ok) {
                const errorText = await response.text();
                alert(errorText);
                return;
            }

            loadItems();
        }

        async function deleteItem(itemId) {
            if (!window.confirm('Удалить это объявление?')) return;

            const response = await fetch(`/api/items/${itemId}`, { method: 'DELETE' });
            if (!response.ok) {
                const errorText = await response.text();
                alert(errorText);
                return;
            }

            loadItems();
        }

        async function updateUserRole(userId, role) {
            const response = await fetch(`/api/users/${userId}/role`, {
                method: 'PATCH',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ role })
            });

            if (!response.ok) {
                const errorText = await response.text();
                alert(errorText);
                return;
            }

            loadUsers();
        }

        async function deleteUser(userId) {
            if (!window.confirm('Удалить аккаунт этого пользователя?')) return;

            const response = await fetch(`/api/users/${userId}`, { method: 'DELETE' });
            if (!response.ok) {
                const errorText = await response.text();
                alert(errorText);
                return;
            }

            loadUsers();
            loadItems();
        }

        document.getElementById('item-image').addEventListener('change', (event) => {
            const [file] = event.target.files;
            const preview = document.getElementById('image-preview');

            if (!file) {
                selectedImageData = '';
                preview.classList.add('hidden');
                preview.innerHTML = '';
                return;
            }

            const reader = new FileReader();
            reader.onload = () => {
                selectedImageData = reader.result;
                preview.classList.remove('hidden');
                preview.innerHTML = `<img src="${reader.result}" alt="Предпросмотр">`;
            };
            reader.readAsDataURL(file);
        });

        document.getElementById('item-form').addEventListener('submit', async (event) => {
            event.preventDefault();

            const payload = {
                title: document.getElementById('item-title').value,
                brand: document.getElementById('item-brand').value,
                model: document.getElementById('item-model').value,
                price: document.getElementById('item-price').value,
                year: document.getElementById('item-year').value,
                description: document.getElementById('item-description').value,
                imageData: selectedImageData
            };

            const response = await fetch('/api/items', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            if (!response.ok) {
                const errorText = await response.text();
                alert(errorText);
                return;
            }

            event.target.reset();
            selectedImageData = '';
            document.getElementById('image-preview').classList.add('hidden');
            document.getElementById('image-preview').innerHTML = '';
            activeTab = 'all';
            updateTabState();
            loadItems();
        });

        document.getElementById('filters-form').addEventListener('submit', (event) => {
            event.preventDefault();
            loadItems();
        });

        document.querySelectorAll('.tab-button').forEach((button) => {
            button.addEventListener('click', () => {
                activeTab = button.dataset.tab;
                updateTabState();
                loadItems();
            });
        });

        document.getElementById('items-list').addEventListener('click', (event) => {
            const favoriteButton = event.target.closest('[data-favorite-id]');
            if (favoriteButton) {
                toggleFavorite(favoriteButton.dataset.favoriteId, favoriteButton.classList.contains('active'));
            }

            const deleteButton = event.target.closest('[data-delete-id]');
            if (deleteButton) {
                deleteItem(deleteButton.dataset.deleteId);
            }
        });

        document.getElementById('users-list').addEventListener('click', (event) => {
            const saveButton = event.target.closest('[data-role-save]');
            if (saveButton) {
                const userId = saveButton.dataset.roleSave;
                const role = document.querySelector(`[data-role-select="${userId}"]`).value;
                updateUserRole(userId, role);
            }

            const deleteButton = event.target.closest('[data-user-delete]');
            if (deleteButton) {
                deleteUser(deleteButton.dataset.userDelete);
            }
        });

        function updateTabState() {
            document.querySelectorAll('.tab-button').forEach((button) => {
                button.classList.toggle('active', button.dataset.tab === activeTab);
            });
        }

        loadProfile().then(loadItems);
    </script>
</body>
</html>
